project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
    - "manual/*.qmd"
  resources:
    - "files/"
    - "CNAME"
    - ".nojekyll"
    - "robots.txt"
    - "llms.txt"
    - "sitemap.xml"

website:
  title: "ICEMAN"
  site-url: "https://www.iceman.help"
  favicon: assets/favicon.svg
  description: "ICEMAN is an instrument for assessing the credibility of effect modification analyses in randomized trials and meta-analyses."
  navbar:
    left:
      - text: "Home"
        href: index.qmd
      - text: "ICEMAN online"
        href: tool.qmd
      - text: "User manual"
        href: manual/index.qmd
        target: iceman-manual
      - text: "About"
        href: about.qmd

  sidebar:
    - title: "User manual"
      style: "docked"
      search: true
      collapse-level: 1
      contents:
        - section: "How to use ICEMAN"
          href: manual/index.qmd
          contents:
            - text: "Assessment in duplicate"
              href: manual/index.qmd#assessment-in-duplicate
            - text: "Reporting"
              href: manual/index.qmd#reporting
            - text: "Using ICEMAN with other instruments"
              href: manual/index.qmd#using-iceman-with-other-instruments
        - text: "Preliminary considerations"
          href: manual/preliminary.qmd
        - section: "ICEMAN for RCTs"
          href: manual/rct.qmd
          contents:
            - text: "1 — Direction a priori"
              href: manual/rct.qmd#rct-item1
            - text: "2 — Prior evidence"
              href: manual/rct.qmd#rct-item2
            - text: "3 — Interaction test"
              href: manual/rct.qmd#rct-item3
            - text: "4 — Multiplicity"
              href: manual/rct.qmd#rct-item4
            - text: "5 — Cut points"
              href: manual/rct.qmd#rct-item5
            - text: "6 — Additional"
              href: manual/rct.qmd#rct-item6
            - text: "7 — Overall rating"
              href: manual/rct.qmd#rct-item7
            - text: "Worked example (CRASH-2)"
              href: manual/rct.qmd#rct-example
        - section: "ICEMAN for meta-analyses"
          href: manual/meta.qmd
          contents:
            - text: "1 — Within vs between"
              href: manual/meta.qmd#meta-item1
            - text: "2 — Similarity across trials"
              href: manual/meta.qmd#meta-item2
            - text: "3 — Number of studies"
              href: manual/meta.qmd#meta-item3
            - text: "4 — Direction a priori"
              href: manual/meta.qmd#meta-item4
            - text: "5 — Interaction test"
              href: manual/meta.qmd#meta-item5
            - text: "6 — Multiplicity"
              href: manual/meta.qmd#meta-item6
            - text: "7 — Random effects model"
              href: manual/meta.qmd#meta-item7
            - text: "8 — Cut points"
              href: manual/meta.qmd#meta-item8
            - text: "9 — Additional"
              href: manual/meta.qmd#meta-item9
            - text: "10 — Overall rating"
              href: manual/meta.qmd#meta-item10
            - text: "Worked example (cervical cancer)"
              href: manual/meta.qmd#meta-example
        - text: "Concept and scope of ICEMAN"
          href: manual/concepts.qmd
        - text: "Frequently asked questions"
          href: manual/faq.qmd

bibliography: references.bib
link-citations: true

format:
  html:
    theme: cosmo
    css: assets/custom.css
    toc: true
    toc-depth: 3
    anchor-sections: false
    link-citations: true
    citations-hover: true
    grid:
      sidebar-width: 320px

csl: assets/vancouver-superscript.csl
